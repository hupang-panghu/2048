<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>2048 小游戏 · by 胖虎</title>
  <style>
    :root {
      --bg: #faf8ef;
      --panel: #bbada0;
      --panel-dark: #8f7a66;
      --text: #776e65;
      --white: #f9f6f2;
      --empty: rgba(238, 228, 218, 0.35);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      --radius: 18px;
      --gap: 12px;
      --board-size: min(92vw, 500px);
      --hint: #8f7a66;
      --danger: #b36a5e;
      --active: #c96f4a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #faf8ef 0%, #f2efe6 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app { width: min(96vw, 620px); }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(42px, 10vw, 72px);
      line-height: 0.95;
      color: #776e65;
      letter-spacing: -2px;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: 14px;
      color: #8f7a66;
      line-height: 1.5;
    }

    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
      flex: 1;
      min-width: 250px;
    }

    .score-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .score-box {
      background: var(--panel-dark);
      color: var(--white);
      border-radius: 12px;
      min-width: 92px;
      padding: 10px 14px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .score-box .label {
      font-size: 12px;
      opacity: 0.85;
      letter-spacing: 0.5px;
    }

    .score-box .value {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.1;
      margin-top: 2px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: none;
      background: #8f7a66;
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease, filter 0.2s ease, background 0.2s ease;
      box-shadow: var(--shadow);
    }

    button:hover { opacity: 0.94; }
    button:active { transform: translateY(1px) scale(0.99); }
    button.secondary { background: #a08d78; }
    button.warn { background: var(--danger); }
    button.active { background: var(--active); }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      filter: grayscale(0.12);
    }

    .status-bar {
      margin: 4px 0 12px;
      background: rgba(255,255,255,0.48);
      color: var(--hint);
      border: 1px solid rgba(143,122,102,0.12);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.5;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
    }

    .status-bar strong { color: #6f5f52; }

    .game-wrap {
      position: relative;
      width: var(--board-size);
      height: var(--board-size);
      margin: 0 auto;
      background: var(--panel);
      border-radius: var(--radius);
      padding: var(--gap);
      box-shadow: var(--shadow);
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overflow: hidden;
    }

    .game-wrap.erase-mode {
      box-shadow: 0 12px 30px rgba(201, 111, 74, 0.32);
      outline: 3px solid rgba(201, 111, 74, 0.28);
    }

    .grid-bg {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--gap);
      width: 100%;
      height: 100%;
    }

    .cell {
      border-radius: 12px;
      background: var(--empty);
    }

    .tile-layer {
      position: absolute;
      inset: var(--gap);
      pointer-events: auto;
    }

    .tile {
      position: absolute;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      transition: transform 0.12s ease-in-out, filter 0.18s ease, outline 0.18s ease;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.10);
      cursor: default;
    }

    .tile.new {
      animation: pop 0.18s ease;
    }

    .erase-mode .tile {
      cursor: pointer;
    }

    .erase-mode .tile:hover {
      filter: brightness(0.95);
      outline: 3px solid rgba(255,255,255,0.5);
    }

    @keyframes pop {
      0% { transform: scale(0.6); }
      100% { transform: scale(1); }
    }

    .overlay {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      background: rgba(238, 228, 218, 0.78);
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      z-index: 10;
    }

    .overlay.show { display: flex; }

    .overlay-card h2 {
      margin: 0 0 10px;
      font-size: clamp(30px, 6vw, 42px);
      color: #776e65;
    }

    .overlay-card p {
      margin: 0 0 16px;
      color: #776e65;
      font-size: 16px;
      line-height: 1.5;
    }

    .tips {
      width: var(--board-size);
      margin: 14px auto 0;
      font-size: 14px;
      color: #8f7a66;
      line-height: 1.7;
    }

    .tips strong { color: #6e6258; }

    .footer {
      width: var(--board-size);
      margin: 14px auto 0;
      text-align: right;
      font-size: 14px;
      color: #8f7a66;
      opacity: 0.95;
    }

    .footer strong {
      color: #6b5d4f;
      letter-spacing: 0.3px;
    }

    @media (max-width: 560px) {
      .top { align-items: stretch; }
      .right-panel { align-items: stretch; min-width: 0; }
      .score-row, .controls { justify-content: stretch; }
      .score-box { flex: 1; min-width: 0; }
      .controls button { flex: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="title-wrap">
        <h1>2048</h1>
        <p class="subtitle">合并相同数字，努力拼出 <strong>2048</strong>。<br>支持无限撤销、无限消除方块，刷新浏览器记录仍保留。</p>
      </div>

      <div class="right-panel">
        <div class="score-row">
          <div class="score-box">
            <div class="label">分数</div>
            <div class="value" id="score">0</div>
          </div>
          <div class="score-box">
            <div class="label">最高分</div>
            <div class="value" id="best">0</div>
          </div>
        </div>
        <div class="controls">
          <button id="restartBtn">重新开始</button>
          <button id="undoBtn">无限撤销</button>
          <button class="warn" id="eraseModeBtn">消除方块</button>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <strong>状态：</strong><span id="statusText">已准备开始。</span>
    </div>

    <div class="game-wrap" id="game">
      <div class="grid-bg" id="gridBg"></div>
      <div class="tile-layer" id="tileLayer"></div>

      <div class="overlay" id="overlay">
        <div class="overlay-card">
          <h2 id="overlayTitle">游戏结束</h2>
          <p id="overlayText">没有可移动的方块了。</p>
          <button id="playAgainBtn">再来一局</button>
        </div>
      </div>
    </div>

    <div class="tips">
      <strong>操作：</strong>电脑端使用方向键 / WASD，手机端可直接滑动。<br />
      <strong>无限撤销：</strong>可一直返回到本局更早步骤。<br />
      <strong>消除方块：</strong>点“消除方块”后，再点任意数字块即可删除，可无限次使用。<br />
      <strong>自动续玩：</strong>每次操作都会自动保存到浏览器本地，刷新页面后记录仍在。
    </div>

    <div class="footer">作者 <strong>by 胖虎</strong></div>
  </div>

  <script>
    const SIZE = 4;
    const STORAGE_KEY = "game_2048_best_score_v3";
    const AUTO_SAVE_KEY = "game_2048_auto_save_v3";

    const TILE_COLORS = {
      2:   ["#eee4da", "#776e65"],
      4:   ["#ede0c8", "#776e65"],
      8:   ["#f2b179", "#f9f6f2"],
      16:  ["#f59563", "#f9f6f2"],
      32:  ["#f67c5f", "#f9f6f2"],
      64:  ["#f65e3b", "#f9f6f2"],
      128: ["#edcf72", "#f9f6f2"],
      256: ["#edcc61", "#f9f6f2"],
      512: ["#edc850", "#f9f6f2"],
      1024:["#edc53f", "#f9f6f2"],
      2048:["#edc22e", "#f9f6f2"]
    };

    const gameEl = document.getElementById("game");
    const gridBg = document.getElementById("gridBg");
    const tileLayer = document.getElementById("tileLayer");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const overlayEl = document.getElementById("overlay");
    const overlayTitleEl = document.getElementById("overlayTitle");
    const overlayTextEl = document.getElementById("overlayText");
    const statusTextEl = document.getElementById("statusText");

    const restartBtn = document.getElementById("restartBtn");
    const undoBtn = document.getElementById("undoBtn");
    const eraseModeBtn = document.getElementById("eraseModeBtn");
    const playAgainBtn = document.getElementById("playAgainBtn");

    let board = [];
    let score = 0;
    let best = Number(localStorage.getItem(STORAGE_KEY) || 0);
    let hasWon = false;
    let historyStack = [];
    let eraseMode = false;

    function initGridBg() {
      gridBg.innerHTML = "";
      for (let i = 0; i < SIZE * SIZE; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        gridBg.appendChild(cell);
      }
    }

    function cloneBoard(b) {
      return b.map(row => row.slice());
    }

    function snapshotState() {
      return {
        board: cloneBoard(board),
        score,
        best,
        hasWon
      };
    }

    function setStatus(text) {
      statusTextEl.textContent = text;
    }

    function pushHistory() {
      historyStack.push(snapshotState());
    }

    function emptyCells() {
      const cells = [];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (board[r][c] === 0) cells.push({ r, c });
        }
      }
      return cells;
    }

    function addRandomTile() {
      const empties = emptyCells();
      if (!empties.length) return null;
      const { r, c } = empties[Math.floor(Math.random() * empties.length)];
      const value = Math.random() < 0.9 ? 2 : 4;
      board[r][c] = value;
      return { r, c, value };
    }

    function updateBest() {
      if (score > best) best = score;
      localStorage.setItem(STORAGE_KEY, String(best));
      scoreEl.textContent = score;
      bestEl.textContent = best;
    }

    function getTileStyle(value) {
      const [bg, color] = TILE_COLORS[value] || ["#3c3a32", "#f9f6f2"];
      return { bg, color };
    }

    function getFontSize(value, cellSize) {
      const len = String(value).length;
      if (len <= 2) return Math.floor(cellSize * 0.42);
      if (len === 3) return Math.floor(cellSize * 0.34);
      if (len === 4) return Math.floor(cellSize * 0.28);
      return Math.floor(cellSize * 0.22);
    }

    function render(newTilePos = null) {
      tileLayer.innerHTML = "";
      updateBest();

      const gap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--gap"));
      const wrapSize = gameEl.clientWidth;
      const inner = wrapSize - gap * 2;
      const cellSize = (inner - gap * (SIZE - 1)) / SIZE;

      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const value = board[r][c];
          if (!value) continue;

          const tile = document.createElement("div");
          tile.className = "tile";
          if (newTilePos && newTilePos.r === r && newTilePos.c === c) {
            tile.classList.add("new");
          }

          const { bg, color } = getTileStyle(value);
          tile.textContent = value;
          tile.style.width = `${cellSize}px`;
          tile.style.height = `${cellSize}px`;
          tile.style.left = `${c * (cellSize + gap)}px`;
          tile.style.top = `${r * (cellSize + gap)}px`;
          tile.style.background = bg;
          tile.style.color = color;
          tile.style.fontSize = `${getFontSize(value, cellSize)}px`;
          tile.dataset.r = String(r);
          tile.dataset.c = String(c);

          tile.addEventListener("click", () => {
            if (!eraseMode) return;
            eraseTile(r, c);
          });

          tileLayer.appendChild(tile);
        }
      }

      updateButtons();
    }

    function compressLine(line) {
      const arr = line.filter(n => n !== 0);
      let gained = 0;
      const merged = [];

      for (let i = 0; i < arr.length; i++) {
        if (arr[i] !== 0 && arr[i] === arr[i + 1]) {
          const v = arr[i] * 2;
          merged.push(v);
          gained += v;
          if (v === 2048) hasWon = true;
          i++;
        } else {
          merged.push(arr[i]);
        }
      }

      while (merged.length < SIZE) merged.push(0);
      return { line: merged, gained };
    }

    function reverse(line) {
      return line.slice().reverse();
    }

    function transpose(mat) {
      return mat[0].map((_, col) => mat.map(row => row[col]));
    }

    function computeMove(direction) {
      let workingBoard = cloneBoard(board);

      if (direction === "right") {
        workingBoard = workingBoard.map(reverse);
      } else if (direction === "up") {
        workingBoard = transpose(workingBoard);
      } else if (direction === "down") {
        workingBoard = transpose(workingBoard).map(reverse);
      }

      let moved = false;
      let gainedTotal = 0;
      let nextBoard = workingBoard.map(row => {
        const { line, gained } = compressLine(row);
        if (!moved && line.some((v, i) => v !== row[i])) moved = true;
        gainedTotal += gained;
        return line;
      });

      if (direction === "right") {
        nextBoard = nextBoard.map(reverse);
      } else if (direction === "up") {
        nextBoard = transpose(nextBoard);
      } else if (direction === "down") {
        nextBoard = transpose(nextBoard.map(reverse));
      }

      return { moved, board: nextBoard, gained: gainedTotal };
    }

    function canMove() {
      if (emptyCells().length) return true;
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const v = board[r][c];
          if ((r + 1 < SIZE && board[r + 1][c] === v) ||
              (c + 1 < SIZE && board[r][c + 1] === v)) {
            return true;
          }
        }
      }
      return false;
    }

    function showOverlay(title, text, autoHide = false) {
      overlayTitleEl.textContent = title;
      overlayTextEl.textContent = text;
      overlayEl.classList.add("show");
      if (autoHide) {
        setTimeout(() => overlayEl.classList.remove("show"), 1400);
      }
    }

    function hideOverlay() {
      overlayEl.classList.remove("show");
    }

    function persistAutoSave() {
      try {
        localStorage.setItem(AUTO_SAVE_KEY, JSON.stringify({
          board: cloneBoard(board),
          score,
          best,
          hasWon,
          historyStack: historyStack.map(item => ({
            board: cloneBoard(item.board),
            score: item.score,
            best: item.best,
            hasWon: item.hasWon
          }))
        }));
      } catch (err) {
        setStatus("浏览器本地记录保存失败。");
      }
    }

    function applySerializedGame(data) {
      if (!data || !Array.isArray(data.board) || data.board.length !== SIZE) {
        throw new Error("无效存档");
      }
      board = cloneBoard(data.board);
      score = Number(data.score || 0);
      best = Math.max(best, Number(data.best || 0));
      hasWon = !!data.hasWon;
      historyStack = Array.isArray(data.historyStack)
        ? data.historyStack.map(item => ({
            board: cloneBoard(item.board),
            score: Number(item.score || 0),
            best: Number(item.best || 0),
            hasWon: !!item.hasWon
          }))
        : [];
      eraseMode = false;
      hideOverlay();
      render();
      updateButtons();
    }

    function tryLoadAutoSave() {
      const raw = localStorage.getItem(AUTO_SAVE_KEY);
      if (!raw) return false;
      try {
        applySerializedGame(JSON.parse(raw));
        setStatus("已恢复浏览器里的上次记录，刷新页面也会保留。");
        return true;
      } catch (err) {
        localStorage.removeItem(AUTO_SAVE_KEY);
        return false;
      }
    }

    function updateButtons() {
      undoBtn.disabled = historyStack.length === 0;
      eraseModeBtn.classList.toggle("active", eraseMode);
      gameEl.classList.toggle("erase-mode", eraseMode);
    }

    function startGame(message = "已开始新的一局。") {
      board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
      score = 0;
      historyStack = [];
      hasWon = false;
      eraseMode = false;
      hideOverlay();
      addRandomTile();
      const tile2 = addRandomTile();
      render(tile2);
      persistAutoSave();
      setStatus(message);
    }

    function undo() {
      if (!historyStack.length) {
        setStatus("没有更早的步骤可以撤销了。");
        updateButtons();
        return;
      }
      const prev = historyStack.pop();
      board = cloneBoard(prev.board);
      score = prev.score;
      best = Math.max(best, Number(prev.best || 0));
      hasWon = !!prev.hasWon;
      eraseMode = false;
      hideOverlay();
      render();
      persistAutoSave();
      setStatus(`已撤销一步，当前还能继续回退 ${historyStack.length} 步。`);
    }

    function toggleEraseMode() {
      eraseMode = !eraseMode;
      updateButtons();
      if (eraseMode) {
        setStatus("已开启消除方块模式：现在点任意数字块即可删除，可无限次使用。");
      } else {
        setStatus("已退出消除方块模式。");
      }
    }

    function eraseTile(r, c) {
      if (!eraseMode) return;
      if (!board[r][c]) {
        setStatus("这里没有方块可消除。");
        return;
      }
      pushHistory();
      const removed = board[r][c];
      board[r][c] = 0;
      eraseMode = false;
      hideOverlay();
      render();
      persistAutoSave();
      setStatus(`已消除一个 ${removed} 方块，记录已自动保存在浏览器。`);
    }

    function move(direction) {
      if (eraseMode) {
        eraseMode = false;
        updateButtons();
      }

      const result = computeMove(direction);
      if (!result.moved) return;

      pushHistory();
      board = result.board;
      score += result.gained;
      const newTile = addRandomTile();
      render(newTile);
      persistAutoSave();

      if (hasWon) {
        showOverlay("你赢了！", "恭喜你成功合成 2048，可以继续挑战更高分。", true);
        setStatus("你已合成 2048，仍可继续挑战更高分。");
      } else if (!canMove()) {
        showOverlay("游戏结束", "已经没有可移动的方块了。");
        setStatus("游戏结束。你可以无限撤销，或用消除方块继续玩。");
      } else {
        setStatus("已移动一步，并自动保存到浏览器本地。");
      }
    }

    function handleKeydown(e) {
      const key = e.key.toLowerCase();
      const map = {
        arrowleft: "left",
        a: "left",
        arrowright: "right",
        d: "right",
        arrowup: "up",
        w: "up",
        arrowdown: "down",
        s: "down"
      };
      const dir = map[key];
      if (!dir) return;
      e.preventDefault();
      move(dir);
    }

    let touchStartX = 0;
    let touchStartY = 0;

    function onTouchStart(e) {
      const t = e.changedTouches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    }

    function onTouchEnd(e) {
      if (eraseMode) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);

      if (Math.max(absX, absY) < 24) return;

      if (absX > absY) {
        move(dx > 0 ? "right" : "left");
      } else {
        move(dy > 0 ? "down" : "up");
      }
    }

    restartBtn.addEventListener("click", () => startGame("已重新开始。"));
    playAgainBtn.addEventListener("click", () => startGame("已重新开始。"));
    undoBtn.addEventListener("click", undo);
    eraseModeBtn.addEventListener("click", toggleEraseMode);

    window.addEventListener("keydown", handleKeydown, { passive: false });
    gameEl.addEventListener("touchstart", onTouchStart, { passive: true });
    gameEl.addEventListener("touchend", onTouchEnd, { passive: true });
    window.addEventListener("resize", () => render());

    initGridBg();
    bestEl.textContent = best;

    if (!tryLoadAutoSave()) {
      startGame("已准备开始。刷新浏览器后记录也会保留。");
    } else {
      render();
      updateButtons();
    }
  </script>
</body>
</html>
